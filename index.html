<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sing-In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3b5bdb;
      --primary-dark: #2c47b0;
      --accent: #f59f00;
      --accent-dark: #e08c00;
      --bg: #f1f3f5;
      --surface: #ffffff;
      --text: #212529;
      --muted: #868e96;
      --border: #dee2e6;
      --danger: #e03131;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 2px 12px rgba(0,0,0,0.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 3rem;
    }

    /* ── Header ── */
    .app-header {
      background: var(--primary);
      color: #fff;
      padding: 0.9rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .app-header h1 { font-size: 1.15rem; font-weight: 700; }
    .session-badge {
      background: rgba(255,255,255,0.2);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.18rem 0.55rem;
      border-radius: 99px;
    }

    /* ── Layout ── */
    .container { max-width: 600px; margin: 0 auto; padding: 1rem; }

    /* ── Current song banner ── */
    .now-singing {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem;
      margin-bottom: 1.1rem;
    }
    .now-singing-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.85;
      margin-bottom: 0.3rem;
    }
    .now-singing-title { font-size: 1.35rem; font-weight: 700; line-height: 1.2; }
    .now-singing-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.65rem;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      background: rgba(255,255,255,0.22);
      padding: 0.28rem 0.7rem;
      border-radius: 99px;
    }
    .now-singing-link:hover { background: rgba(255,255,255,0.32); }

    /* ── Section label ── */
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    /* ── Song list ── */
    .song-list { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1.25rem; }

    .song-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 0.8rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: var(--shadow);
      transition: opacity 0.15s;
    }

    /* Vote button */
    .vote-btn {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 3.1rem;
      padding: 0.45rem 0.3rem;
      border: 2px solid var(--primary);
      border-radius: 8px;
      background: none;
      color: var(--primary);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .vote-btn:hover:not(:disabled) { background: var(--primary); color: #fff; }
    .vote-btn:disabled { border-color: var(--border); color: var(--muted); cursor: default; }
    .vote-arrow { font-size: 1rem; line-height: 1; }
    .vote-count { font-size: 0.95rem; font-weight: 700; line-height: 1.2; }
    .vote-label { font-size: 0.58rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

    /* Song info */
    .song-info { flex: 1; min-width: 0; }
    .song-title { font-weight: 600; font-size: 0.97rem; line-height: 1.3; }
    .song-badges { display: flex; gap: 0.35rem; margin-top: 0.3rem; flex-wrap: wrap; }
    .badge {
      font-size: 0.66rem;
      font-weight: 600;
      padding: 0.12rem 0.42rem;
      border-radius: 99px;
    }

    /* Song action icons */
    .song-actions { display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0; }
    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.1rem;
      height: 2.1rem;
      border: none;
      background: none;
      border-radius: 6px;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.1s, background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover { color: var(--text); background: var(--bg); }

    /* ── Suggestion form ── */
    .suggest-section {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.1rem 1.1rem 1.2rem;
      box-shadow: var(--shadow);
    }
    .suggest-section h2 { font-size: 0.97rem; font-weight: 700; margin-bottom: 0.8rem; }

    .autocomplete-wrap { position: relative; }
    .suggest-input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .suggest-input:focus { border-color: var(--primary); background: #fff; }

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 3px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
      z-index: 50;
      max-height: 230px;
      overflow-y: auto;
    }
    .ac-item {
      padding: 0.65rem 0.9rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: #edf2ff; }
    .ac-item-title { font-weight: 600; font-size: 0.93rem; }
    .ac-item-sub { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }

    .suggest-btn {
      width: 100%;
      margin-top: 0.7rem;
      padding: 0.78rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.97rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .suggest-btn:hover:not(:disabled) { background: var(--primary-dark); }
    .suggest-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

    /* ── Inline messages ── */
    .msg {
      padding: 0.6rem 0.85rem;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.7rem;
    }
    .msg-warn  { background: #fff3cd; color: #664d03; border: 1px solid #ffe69c; }
    .msg-error { background: #fde8e8; color: #991b1b; border: 1px solid #fca5a5; }
    .msg-ok    { background: #d3f9d8; color: #1a5c28; border: 1px solid #8ce99a; }

    /* ── Empty / error states ── */
    .empty { text-align: center; padding: 2.2rem 1rem; color: var(--muted); font-size: 0.93rem; }
    .full-page-msg {
      max-width: 360px;
      margin: 5rem auto;
      text-align: center;
      padding: 1.5rem;
    }
    .full-page-msg h2 { font-size: 1.3rem; margin-bottom: 0.6rem; }
    .full-page-msg p  { color: var(--muted); font-size: 0.93rem; line-height: 1.5; }

  </style>
</head>
<body>

<div id="root"><div class="full-page-msg"><p>Loading&hellip;</p></div></div>


<script src="config.js"></script>
<script>
'use strict';

// ── Guard ──────────────────────────────────────────────────────────────────
if (typeof APPS_SCRIPT_URL === 'undefined' || typeof SHEET_ID === 'undefined') {
  document.getElementById('root').innerHTML =
    '<div class="full-page-msg"><h2>Setup incomplete</h2>' +
    '<p>config.js is missing. See README for setup instructions.</p></div>';
  throw new Error('config.js not loaded');
}

// ── State ──────────────────────────────────────────────────────────────────
let sessionNum      = null;
let sessionPassword = null;
let catalog         = [];   // rows from catalog sheet
let songs           = [];   // rows from session_N sheet
let votedIds        = new Set();
let selectedSong    = null; // catalog entry chosen from autocomplete
let acItems         = [];   // current autocomplete results
let acIndex         = -1;
let msgTimer        = null;

// ── CSV ────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (inQ) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"')         { inQ = false; }
      else                        { field += c; }
    } else {
      if      (c === '"')              { inQ = true; }
      else if (c === ',')              { row.push(field); field = ''; }
      else if (c === '\r' && n === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; }
      else if (c === '\n' || c === '\r') { row.push(field); rows.push(row); row = []; field = ''; }
      else                             { field += c; }
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }

  if (rows.length < 1) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1)
    .filter(r => r.some(c => c.trim()))
    .map(r => Object.fromEntries(headers.map((h, i) => [h, (r[i] || '').trim()])));
}

async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} fetching "${name}"`);
  const text = await res.text();
  if (text.trim().startsWith('<')) throw new Error(`Sheet "${name}" is not publicly accessible`);
  return parseCSV(text);
}

// ── Boolean helpers ────────────────────────────────────────────────────────
const isTrue = v => v === 'TRUE' || v === 'true' || v === true;

// ── Write API ──────────────────────────────────────────────────────────────
function apiWrite(params) {
  const body = new URLSearchParams({ ...params, session: sessionNum, password: sessionPassword });
  fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body }).catch(() => {});
}

// ── Unique ID ──────────────────────────────────────────────────────────────
function uid() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ── Escape HTML ────────────────────────────────────────────────────────────
function h(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  const p = new URLSearchParams(location.search);
  sessionNum      = p.get('s');
  sessionPassword = p.get('pw');

  if (!sessionNum || !sessionPassword) {
    return fullMsg('Access Denied', 'Session parameters are missing. Please scan the QR code to join.');
  }

  // Restore voted IDs
  try {
    JSON.parse(localStorage.getItem(`singin_voted_s${sessionNum}`) || '[]')
      .forEach(id => votedIds.add(id));
  } catch {}

  try {
    const validateUrl = `${APPS_SCRIPT_URL}?action=validate&s=${encodeURIComponent(sessionNum)}&pw=${encodeURIComponent(sessionPassword)}`;
    const validateRes = await fetch(validateUrl);
    const { valid } = await validateRes.json();
    if (!valid) {
      return fullMsg('Access Denied', 'Invalid session link. Please scan the correct QR code.');
    }

    [catalog, songs] = await Promise.all([
      fetchSheet('catalog'),
      fetchSheet(`session_${sessionNum}`)
    ]);

    renderApp();
    setInterval(poll, 20000);

  } catch (err) {
    console.error(err);
    fullMsg('Could not load', 'Check your internet connection and refresh the page.');
  }
}

async function poll() {
  try {
    songs = await fetchSheet(`session_${sessionNum}`);
    renderCurrentSong();
    renderSongList();
  } catch (err) {
    console.error('Poll failed:', err);
  }
}

// ── Actions ────────────────────────────────────────────────────────────────
function upvote(id) {
  if (votedIds.has(id)) return;
  const song = songs.find(s => s.id === id);
  if (!song) return;

  song.votes = String((Number(song.votes) || 0) + 1);
  votedIds.add(id);
  localStorage.setItem(`singin_voted_s${sessionNum}`, JSON.stringify([...votedIds]));
  renderSongList();
  apiWrite({ action: 'upvote', id });
}


function submitSuggestion(inputEl) {
  if (!selectedSong) return;

  const title = selectedSong.title;
  const link  = selectedSong.link || '';

  const doneSong = songs.find(s => s.title.toLowerCase() === title.toLowerCase() && isTrue(s.done));
  if (doneSong) {
    showMsg('warn', 'That song has already been sung — pick another!');
    return;
  }

  const existing = songs.find(s => s.title.toLowerCase() === title.toLowerCase() && !isTrue(s.done));
  if (existing) {
    showMsg('warn', `"${title}" is already on the list — upvote it instead!`);
    return;
  }

  const id = uid();
  songs.push({ id, title, link, votes: '0', current: 'FALSE', done: 'FALSE' });

  inputEl.value = '';
  selectedSong  = null;
  closeAC();
  updateSubmitBtn(inputEl);
  showMsg('ok', `"${title}" added to the queue!`);
  renderSongList();
  apiWrite({ action: 'suggest', id, title, link });
}

// ── Autocomplete ───────────────────────────────────────────────────────────
function getSuggestions(q) {
  if (!q) return [];
  const lq = q.toLowerCase();
  const doneTitles = new Set(songs.filter(s => isTrue(s.done)).map(s => s.title.toLowerCase()));
  return catalog
    .filter(song => {
      if (doneTitles.has(song.title.toLowerCase())) return false;
      if (song.title.toLowerCase().includes(lq)) return true;
      if (song.number && song.number.toLowerCase().includes(lq)) return true;
      return (song.alternates || '').split(',').some(a => a.trim().toLowerCase().includes(lq));
    })
    .slice(0, 10);
}

function openAC(items, inputEl) {
  acItems = items;
  acIndex = -1;
  const list = document.getElementById('ac-list');
  if (!list) return;

  list.innerHTML = '';
  if (!items.length) { list.style.display = 'none'; return; }

  items.forEach((song, i) => {
    const div = document.createElement('div');
    div.className = 'ac-item';

    const t = document.createElement('div');
    t.className = 'ac-item-title';
    t.textContent = song.title;
    div.appendChild(t);

    const sub = [song.collection, song.number ? `#${song.number}` : ''].filter(Boolean).join(' · ');
    if (sub) {
      const s = document.createElement('div');
      s.className = 'ac-item-sub';
      s.textContent = sub;
      div.appendChild(s);
    }

    div.addEventListener('mousedown', e => {
      e.preventDefault();
      pickAC(i, inputEl);
    });
    list.appendChild(div);
  });
  list.style.display = 'block';
}

function closeAC() {
  const list = document.getElementById('ac-list');
  if (list) list.style.display = 'none';
  acItems = [];
  acIndex = -1;
}

function pickAC(i, inputEl) {
  const song = acItems[i];
  if (!song) return;
  selectedSong = song;
  inputEl.value = song.title;
  updateSubmitBtn(inputEl);
  closeAC();
}

function highlightAC(i) {
  acIndex = i;
  document.querySelectorAll('.ac-item').forEach((el, j) => el.classList.toggle('active', j === i));
}

// ── Rendering ──────────────────────────────────────────────────────────────
function fullMsg(title, body) {
  document.getElementById('root').innerHTML =
    `<div class="full-page-msg"><h2>${h(title)}</h2><p>${h(body)}</p></div>`;
}

function renderApp() {
  document.getElementById('root').innerHTML = `
    <header class="app-header">
      <h1>Sing-In</h1>
      <span class="session-badge">Session ${h(sessionNum)}</span>
    </header>
    <main class="container">
      <div id="current-song-area"></div>
      <p class="section-label">Song Queue</p>
      <div id="song-list-area"></div>
      <section class="suggest-section" aria-label="Suggest a song">
        <h2>Suggest a Song</h2>
        <div id="suggest-msg"></div>
        <div class="autocomplete-wrap">
          <input type="text" id="suggest-input" class="suggest-input"
            placeholder="Search the catalog&hellip;"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            aria-label="Song title" aria-autocomplete="list" aria-controls="ac-list">
          <div id="ac-list" class="autocomplete-list" style="display:none" role="listbox"></div>
        </div>
        <button id="suggest-btn" class="suggest-btn" disabled>Add to Queue</button>
      </section>
    </main>`;

  renderCurrentSong();
  renderSongList();
  wireInput();
}

function renderCurrentSong() {
  const area = document.getElementById('current-song-area');
  if (!area) return;
  const cur = songs.find(s => isTrue(s.current));
  if (!cur) { area.innerHTML = ''; return; }
  area.innerHTML = `
    <div class="now-singing" aria-label="Now singing">
      <div class="now-singing-label">Now Singing</div>
      <div class="now-singing-title">${h(cur.title)}</div>
      ${cur.link
        ? `<a class="now-singing-link" href="${h(cur.link)}" target="_blank" rel="noopener noreferrer">♪ Lyrics / Chords</a>`
        : ''}
    </div>`;
}

function renderSongList() {
  const area = document.getElementById('song-list-area');
  if (!area) return;

  const visible = songs
    .filter(s => !isTrue(s.done) && !isTrue(s.current))
    .sort((a, b) => (Number(b.votes) || 0) - (Number(a.votes) || 0));

  if (!visible.length) {
    area.innerHTML = '<div class="empty">No songs in the queue yet — suggest one below!</div>';
    return;
  }

  area.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'song-list';

  visible.forEach(song => {
    const voted = votedIds.has(song.id);

    const card = document.createElement('div');
    card.className = 'song-card';

    // Vote button
    const vBtn = document.createElement('button');
    vBtn.className  = 'vote-btn';
    vBtn.disabled   = voted;
    vBtn.title      = voted ? 'You already voted for this song' : 'Vote for this song';
    vBtn.setAttribute('aria-label', `${voted ? 'Voted' : 'Vote'} — ${song.votes || 0} votes`);
    vBtn.innerHTML  = `<span class="vote-arrow">▲</span><span class="vote-count">${h(String(song.votes || 0))}</span><span class="vote-label">${voted ? 'voted' : 'vote'}</span>`;
    if (!voted) vBtn.addEventListener('click', () => upvote(song.id));
    card.appendChild(vBtn);

    // Info
    const info = document.createElement('div');
    info.className = 'song-info';
    const titleEl = document.createElement('div');
    titleEl.className   = 'song-title';
    titleEl.textContent = song.title;
    info.appendChild(titleEl);

    card.appendChild(info);

    // Actions: link only
    if (song.link) {
      const actions = document.createElement('div');
      actions.className = 'song-actions';
      const lnk = document.createElement('a');
      lnk.className = 'icon-btn';
      lnk.href      = song.link;
      lnk.target    = '_blank';
      lnk.rel       = 'noopener noreferrer';
      lnk.title     = 'Lyrics / Chords';
      lnk.setAttribute('aria-label', 'Open lyrics or chords');
      lnk.textContent = '♪';
      actions.appendChild(lnk);
      card.appendChild(actions);
    }
    list.appendChild(card);
  });

  area.appendChild(list);
}

function showMsg(type, text) {
  const area = document.getElementById('suggest-msg');
  if (!area) return;
  clearTimeout(msgTimer);
  const cls = type === 'warn' ? 'msg-warn' : type === 'error' ? 'msg-error' : 'msg-ok';
  area.innerHTML = `<div class="msg ${cls}" role="status">${h(text)}</div>`;
  msgTimer = setTimeout(() => { area.innerHTML = ''; }, 5000);
}

function updateSubmitBtn(inputEl) {
  const btn = document.getElementById('suggest-btn');
  if (btn) btn.disabled = !selectedSong;
}

// ── Input wiring ───────────────────────────────────────────────────────────
function wireInput() {
  const input = document.getElementById('suggest-input');
  const btn   = document.getElementById('suggest-btn');
  if (!input || !btn) return;

  input.addEventListener('input', () => {
    selectedSong = null;
    updateSubmitBtn(input);
    const suggestions = getSuggestions(input.value.trim());
    openAC(suggestions, input);
  });

  input.addEventListener('keydown', e => {
    if (!acItems.length) {
      if (e.key === 'Enter') { e.preventDefault(); submitSuggestion(input); }
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      highlightAC(Math.min(acIndex + 1, acItems.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      highlightAC(Math.max(acIndex - 1, 0));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (acIndex >= 0) pickAC(acIndex, input);
      else { closeAC(); submitSuggestion(input); }
    } else if (e.key === 'Escape') {
      closeAC();
    }
  });

  input.addEventListener('blur', () => setTimeout(closeAC, 150));

  btn.addEventListener('click', () => submitSuggestion(input));
}

// ── Go ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
